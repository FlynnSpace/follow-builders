name: Deliver Digest

on:
  schedule:
    # 9:00 AM China time (UTC+8) = 1:00 AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  deliver:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Setup user config
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          mkdir -p ~/.follow-builders
          echo '{"platform":"other","language":"zh","timezone":"Asia/Shanghai","frequency":"daily","deliveryTime":"09:00","delivery":{"method":"telegram","chatId":"'"${TELEGRAM_CHAT_ID}"'"},"onboardingComplete":true}' > ~/.follow-builders/config.json
          echo "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}" > ~/.follow-builders/.env
          echo "Config written:"
          cat ~/.follow-builders/config.json

      - name: Prepare digest
        run: |
          cd scripts
          node prepare-digest.js > /tmp/fb-feed.json 2>/dev/null
          if [ ! -s /tmp/fb-feed.json ]; then
            echo "ERROR: Failed to fetch feed data"
            exit 1
          fi
          echo "Feed fetched, size: $(wc -c < /tmp/fb-feed.json) bytes"

      - name: Generate digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          cd scripts
          if [ -n "$OPENAI_API_KEY" ] || [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "Using LLM-powered remix..."
            cat /tmp/fb-feed.json | node remix-digest.js > /tmp/fb-digest.txt
          else
            echo "No LLM API key, using basic formatting..."
            cat /tmp/fb-feed.json | node format-digest.js > /tmp/fb-digest.txt
          fi
          echo "Digest generated, size: $(wc -c < /tmp/fb-digest.txt) bytes"
          echo "--- Preview (first 500 chars) ---"
          head -c 500 /tmp/fb-digest.txt

      - name: Deliver to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          cd scripts
          if [ ! -s /tmp/fb-digest.txt ]; then
            echo "No content to deliver"
            exit 0
          fi
          node deliver.js --file /tmp/fb-digest.txt
